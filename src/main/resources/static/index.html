<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周末活动规划助手</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --primary: #1677ff;
  --primary-bg: #e6f4ff;
  --success: #52c41a;
  --success-bg: #f6ffed;
  --warning: #faad14;
  --warning-bg: #fffbe6;
  --error: #ff4d4f;
  --error-bg: #fff2f0;
  --text: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.65);
  --text-tertiary: rgba(0,0,0,0.45);
  --text-disabled: rgba(0,0,0,0.25);
  --bg-elevated: #fff;
  --bg-layout: #f5f5f5;
  --bg-container: rgba(0,0,0,0.02);
  --bg-hover: rgba(0,0,0,0.04);
  --bg-active: rgba(0,0,0,0.06);
  --border: rgba(0,0,0,0.06);
  --border-light: rgba(0,0,0,0.04);
  --radius-sm: 6px;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 1px 2px rgba(0,0,0,0.03), 0 1px 6px -1px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
  font-size: 14px; line-height: 1.5715; color: var(--text); background: var(--bg-layout);
  height: 100vh; display: flex; justify-content: center;
}

/* ── Layout ── */
#app {
  width: 100%; max-width: 960px; height: 100vh; display: flex; background: var(--bg-elevated);
  box-shadow: var(--shadow);
}

/* ── Sidebar ── */
#sidebar {
  width: 260px; background: var(--bg-container); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}
#sidebar .s-head {
  padding: 20px 16px 10px; font-size: 16px; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
#sidebar .s-add {
  margin: 0 12px 12px; padding: 8px 0; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer;
  transition: opacity 0.2s;
}
#sidebar .s-add:hover { opacity: 0.85; }
#sidebar .s-list { flex:1; overflow-y:auto; padding: 4px 8px; }
#sidebar .s-item {
  padding: 10px 12px; margin: 1px 0; border-radius: var(--radius);
  font-size: 14px; color: var(--text-secondary); cursor: pointer;
  transition: background 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#sidebar .s-item:hover { background: var(--bg-hover); }
#sidebar .s-item.active { background: var(--primary-bg); color: var(--primary); }

/* ── Main chat ── */
#main { flex:1; display:flex; flex-direction:column; min-width:0; }
#status { padding: 8px 24px; font-size: 12px; color: var(--text-tertiary); border-bottom: 1px solid var(--border-light); }
#messages { flex:1; overflow-y:auto; padding: 24px; }
#messages:empty::after {
  content: "输入你想安排的活动，AI 助手为你规划完整方案 ✨";
  display: flex; align-items: center; justify-content: center; height: 100%;
  color: var(--text-disabled); font-size: 15px; text-align: center; padding: 40px;
}

/* ── Animations ── */
.msg { animation: fadeIn 0.2s ease; margin-bottom: 20px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
@keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.dot.on { background: var(--success); }
.dot.busy { background: var(--warning); animation: cursor-blink 0.8s infinite; }

/* ── User bubble ── */
.msg.user { display: flex; justify-content: flex-end; }
.msg.user .bubble {
  max-width: 75%; background: var(--primary); color: #fff; padding: 10px 16px;
  border-radius: 16px 16px 4px 16px; font-size: 14px; line-height: 1.5715; word-break: break-word;
  box-shadow: 0 2px 8px rgba(22,119,255,0.15);
}

/* ── ThoughtChain ── */
.chain { position: relative; padding-left: 32px; }
.chain::before {
  content: ''; position: absolute; left: 14px; top: 8px; bottom: 8px;
  width: 1px; border-left: 2px dashed rgba(0,0,0,0.12);
}
.chain .step { position: relative; margin-bottom: 16px; }
.chain .step:last-child { margin-bottom: 0; }
.chain .step .s-icon {
  position: absolute; left: -24px; top: 2px;
  width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; z-index: 1;
}
.chain .step .s-icon.think { background: var(--warning-bg); border: 1px solid rgba(250,173,20,0.3); }
.chain .step .s-icon.tool { background: var(--primary-bg); border: 1px solid rgba(22,119,255,0.3); }
.chain .step .s-icon.obs { background: var(--success-bg); border: 1px solid rgba(82,196,26,0.3); }
.chain .step .s-title { font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px; font-weight: 500; }
.chain .step .s-body { font-size: 14px; line-height: 1.5715; color: var(--text); }
.chain .step .s-body.think-body { color: var(--text-secondary); font-style: italic; }
.chain .step .s-tag {
  display: inline-flex; align-items: center; background: var(--primary-bg); color: var(--primary);
  border: 1px solid rgba(22,119,255,0.2); border-radius: 4px; padding: 1px 8px;
  font-family: "SF Mono", "Cascadia Code", monospace; font-size: 13px; font-weight: 500;
}
.chain .step .s-json {
  margin-top: 4px; background: var(--success-bg); border: 1px solid rgba(82,196,26,0.2);
  border-radius: var(--radius-sm); padding: 8px 12px; max-height: 160px; overflow-y: auto;
  font-family: "SF Mono", monospace; font-size: 12px; color: #389e0d; white-space: pre-wrap;
}

/* ── Plan card ── */
.plan {
  background: var(--warning-bg); border: 1px solid rgba(250,173,20,0.3);
  border-radius: var(--radius-lg); padding: 20px 24px; font-size: 14px; line-height: 1.7;
}
.plan h1,.plan h2,.plan h3,.plan h4 { margin: 12px 0 6px; font-size: 15px; font-weight: 600; }
.plan p { margin: 4px 0; }
.plan ul,.plan ol { padding-left: 22px; margin: 6px 0; }
.plan li { margin: 2px 0; }
.plan code { background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: "SF Mono", monospace; }
.plan pre { background: rgba(0,0,0,0.03); padding: 10px 14px; border-radius: var(--radius); overflow-x: auto; margin: 8px 0; font-size: 13px; }
.plan pre code { background: none; padding: 0; }
.plan table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
.plan th,.plan td { border: 1px solid rgba(0,0,0,0.08); padding: 8px 12px; text-align: left; }
.plan th { background: rgba(0,0,0,0.03); font-weight: 600; }
.plan blockquote { border-left: 3px solid rgba(250,173,20,0.4); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
.plan strong { font-weight: 600; }
.plan hr { border: none; border-top: 1px solid rgba(0,0,0,0.06); margin: 14px 0; }
.plan-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.06); }
.plan-actions button {
  padding: 8px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all 0.2s; border: none;
}
.plan-actions .btn-ok { background: var(--primary); color: #fff; box-shadow: 0 2px 0 rgba(0,0,0,0.02); }
.plan-actions .btn-ok:hover { opacity: 0.85; }
.plan-actions .btn-no { background: #fff; color: var(--text); border: 1px solid rgba(0,0,0,0.15) !important; }
.plan-actions .btn-no:hover { color: var(--primary); border-color: var(--primary) !important; }

/* ── Done / Error / Confirm ── */
.done {
  background: var(--success-bg); border: 1px solid rgba(82,196,26,0.3);
  border-radius: var(--radius); padding: 12px 20px; font-size: 15px; text-align: center; color: var(--success);
}
.err {
  background: var(--error-bg); border: 1px solid rgba(255,77,79,0.2);
  border-radius: var(--radius); padding: 10px 16px; color: var(--error); font-size: 14px;
}
.confirming { font-size: 13px; color: var(--warning); padding: 6px 0; }

/* ── Input ── */
#input-area { padding: 16px 24px; border-top: 1px solid var(--border-light); display: flex; gap: 10px; background: var(--bg-elevated); }
#input-area input {
  flex: 1; padding: 10px 16px; border: 1px solid rgba(0,0,0,0.15); border-radius: var(--radius);
  font-size: 14px; outline: none; color: var(--text); transition: border 0.2s, box-shadow 0.2s;
}
#input-area input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
#input-area input::placeholder { color: var(--text-disabled); }
#input-area button {
  padding: 10px 24px; background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer;
  transition: opacity 0.2s; white-space: nowrap;
}
#input-area button:hover { opacity: 0.85; }
#input-area button:disabled { background: #91caff; cursor: not-allowed; opacity: 1; }

/* ── Status dot ── */
.status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.status-dot.ok { background: var(--success); }
.status-dot.busy { background: var(--warning); animation: cursor-blink 0.8s infinite; }

/* ── Responsive ── */
@media (max-width: 720px) {
  #sidebar { display: none; }
  #messages { padding: 16px; }
  #input-area { padding: 10px 14px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="s-head">🤖 活动规划助手</div>
    <button class="s-add" onclick="location.reload()">+ 新对话</button>
    <div class="s-list" id="convoList"></div>
  </div>

  <div id="main">
    <div id="status"><span class="status-dot ok"></span>就绪</div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="userInput" placeholder="输入你想安排的活动..." autofocus>
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<script>
let ws, planning = false, round = [];

marked.setOptions({ breaks: true, gfm: true });

function setStatus(s) {
  const m = { ok:'就绪', busy:'Agent 思考中...', off:'连接断开' };
  document.getElementById('status').innerHTML =
    '<span class="status-dot '+s+'"></span>'+m[s];
}

function connect() {
  ws = new WebSocket('ws://'+location.host+'/ws/chat');
  ws.onmessage = e => {
    const s = JSON.parse(e.data);
    render(s);
  };
  ws.onclose = () => { planning=false; setStatus('off'); };
  ws.onerror = () => { planning=false; setStatus('off'); };
}

function sendMessage() {
  const el = document.getElementById('userInput'), t = el.value.trim();
  if (!t || planning) return;
  planning = true;
  document.getElementById('sendBtn').disabled = true;
  setStatus('busy');
  addUser(t);
  sidebarAdd(t);
  el.value = '';
  ws.send(JSON.stringify({ content: t }));
}

function addUser(t) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = '<div class="bubble">'+esc(t)+'</div>';
  document.getElementById('messages').appendChild(d);
  scroll();
}

function render(s) {
  switch (s.type) {
    case 'THOUGHT': round = [{ type:'THOUGHT', content:s.content }]; break;
    case 'ACTION': round.push({ type:'ACTION', tool:s.tool, params:s.params }); break;
    case 'OBSERVATION':
      round.push({ type:'OBSERVATION', content:s.content });
      addChain(round); round = []; break;
    case 'FINAL_PLAN': addPlan(s.content); break;
    case 'CONFIRMING': addMsg('confirming', '⏳ '+s.content); break;
    case 'DONE': addDone(s.content); break;
    case 'ERROR': addErr(s.content); break;
  }
  scroll();
}

function scroll() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// ── ThoughtChain ──
function addChain(steps) {
  const d = document.createElement('div');
  d.className = 'msg chain';
  let h = '';
  steps.forEach((s, i) => {
    if (s.type === 'THOUGHT') {
      h += '<div class="step"><div class="s-icon think">💡</div><div class="s-title">思考</div><div class="s-body think-body">'+esc(s.content)+'</div></div>';
    } else if (s.type === 'ACTION') {
      const p = s.params ? ' <span style="color:var(--text-secondary);font-size:13px">'+trunc(esc(s.params),60)+'</span>' : '';
      h += '<div class="step"><div class="s-icon tool">🔧</div><div class="s-title">调用工具</div><div class="s-body"><span class="s-tag">'+esc(s.tool)+'</span>'+p+'</div></div>';
    } else if (s.type === 'OBSERVATION') {
      h += '<div class="step"><div class="s-icon obs">👁</div><div class="s-title">返回结果</div><div class="s-body"><div class="s-json">'+esc(fmtJson(s.content))+'</div></div></div>';
    }
  });
  d.innerHTML = h;
  document.getElementById('messages').appendChild(d);
}

// ── Plan ──
function addPlan(content) {
  const d = document.createElement('div');
  d.className = 'msg';
  const html = marked.parse(content);
  d.innerHTML = '<div class="plan">'+html+
    '<div class="plan-actions">'+
    '<button class="btn-ok" onclick="confirmPlan()">✓ 确认方案</button>'+
    '<button class="btn-no" onclick="adjustPlan()">调整方案</button>'+
    '</div></div>';
  document.getElementById('messages').appendChild(d);
  endPlan();
}

function addDone(t) {
  const d = document.createElement('div');
  d.className = 'msg'; d.innerHTML = '<div class="done">🎉 '+esc(t)+'</div>';
  document.getElementById('messages').appendChild(d);
  endPlan();
}

function addErr(t) {
  const d = document.createElement('div');
  d.className = 'msg'; d.innerHTML = '<div class="err">❌ '+esc(t)+'</div>';
  document.getElementById('messages').appendChild(d);
  endPlan();
}

function addMsg(c, t) {
  const d = document.createElement('div');
  d.className = 'msg '+c; d.textContent = t;
  document.getElementById('messages').appendChild(d);
}

function endPlan() {
  planning = false;
  document.getElementById('sendBtn').disabled = false;
  setStatus('ok');
}

function confirmPlan() {
  ws.send(JSON.stringify({ type:'confirm', content:'确认执行此方案' }));
  planning = true;
  document.getElementById('sendBtn').disabled = true;
  setStatus('busy');
}

function adjustPlan() {
  const el = document.getElementById('userInput');
  el.value = '请调整方案：'; el.focus();
}

function sidebarAdd(title) {
  const list = document.getElementById('convoList');
  list.querySelectorAll('.s-item').forEach(c => c.classList.remove('active'));
  const div = document.createElement('div');
  div.className = 's-item active';
  div.textContent = trunc(title, 20);
  list.insertBefore(div, list.firstChild);
}

// ── helpers ──
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function trunc(s,n) { return s&&s.length>n ? s.slice(0,n)+'...' : s||''; }
function fmtJson(s) { try{ return JSON.stringify(JSON.parse(s),null,2); } catch(e){ return s; } }

document.getElementById('userInput').addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
connect();
</script>
</body>
</html>
