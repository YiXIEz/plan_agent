server:
  port: 8080

llm:
  primary: qwen
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com/v1
    model-name: deepseek-chat
  qwen:
    api-key: sk-fa85834e133d417a830b06247189a4f1
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model-name: qwen-plus

amap:
  api-key: b43933c8ea1fff62be2ee12090623958

spring:
  config:
    import: optional:classpath:application-scoring.yml
  datasource:
    url: jdbc:h2:mem:plan_agent;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

logging:
  level:
    com.planagent: DEBUG
